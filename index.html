<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缅怀纪念 - 永远的回忆</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- qrcode.js 用于生成分享二维码 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <!-- Supabase SDK (UMD 2.49.4 - 完整浏览器兼容) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo"><i class="fas fa-dove"></i> 缅怀纪念</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link active">照片墙</a>
                <a href="register.html" class="nav-link">登记信息</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h2 class="hero-title">永远的回忆</h2>
            <p class="hero-subtitle">那些美好的时光，将永远留在我们心中</p>
        </div>
    </section>

    <main class="main-content">
        <div class="container">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">全部回忆</button>
                <button class="filter-btn" data-filter="recent">最新添加</button>
                <button class="filter-btn" data-filter="most-comments">最多留言</button>
            </div>

            <div class="masonry-grid" id="photoWall">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在加载回忆...</p>
                </div>
            </div>

            <div class="load-more">
                <button class="btn-load-more" id="loadMore">加载更多回忆</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>永远怀念 · 永远铭记</p>
            <p class="footer-quote">"那些我们爱过的人，永远不会真正离开我们"</p>
        </div>
    </footer>

    <!-- 分享浮动按钮 -->
    <button class="share-fab" id="shareFab" title="分享给朋友">
        <i class="fas fa-share-alt"></i>
    </button>

    <!-- 分享弹窗 -->
    <div class="modal" id="shareModal">
        <div class="modal-content share-modal-content">
            <span class="close-modal" id="closeShareModal">&times;</span>
            <h3><i class="fas fa-share-alt"></i> 分享给朋友</h3>
            <p class="share-desc">扫描二维码或复制链接，分享这份珍贵的回忆</p>
            <div class="share-qrcode-wrap">
                <div id="shareQrcode"></div>
                <p class="share-qrcode-tip">长按二维码保存图片</p>
            </div>
            <div class="share-link-wrap">
                <input type="text" id="shareLinkInput" readonly>
                <button class="btn-copy-link" id="btnCopyLink"><i class="fas fa-copy"></i> 复制链接</button>
            </div>
            <div class="share-actions">
                <button class="btn-action btn-share-wechat" id="btnShareWechat">
                    <i class="fab fa-weixin"></i> 微信
                </button>
                <button class="btn-action btn-share-weibo" id="btnShareWeibo">
                    <i class="fab fa-weibo"></i> 微博
                </button>
                <button class="btn-action btn-share-qq" id="btnShareQQ">
                    <i class="fab fa-qq"></i> QQ
                </button>
            </div>
        </div>
    </div>

    <!-- 照片详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content detail-modal-content">
            <span class="close-modal" id="closeDetailModal">&times;</span>
            <div class="detail-photo-wrap">
                <img id="detailPhotoImg" src="" alt="">
            </div>
            <div class="detail-info" id="detailInfo">
                <!-- 动态填充 -->
            </div>
            <div class="detail-actions">
                <button class="btn-action btn-edit" id="btnEditPhoto"><i class="fas fa-edit"></i> 编辑</button>
                <button class="btn-action btn-delete" id="btnDeletePhoto"><i class="fas fa-trash-alt"></i> 删除</button>
                <button class="btn-action btn-comment-open" id="btnOpenComment"><i class="far fa-comment"></i> 留言</button>
            </div>
            <!-- 编辑表单（默认隐藏） -->
            <div class="edit-form-wrap" id="editFormWrap" style="display:none;">
                <h4><i class="fas fa-edit"></i> 编辑照片信息</h4>
                <form id="editForm">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label>与逝者关系</label>
                        <select id="editRelation">
                            <option value="">请选择</option>
                            <option value="家人">家人</option>
                            <option value="亲戚">亲戚</option>
                            <option value="朋友">朋友</option>
                            <option value="同事">同事</option>
                            <option value="同学">同学</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>留言祝福</label>
                        <textarea id="editMessage" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>照片描述</label>
                        <textarea id="editPhotoDesc" rows="3"></textarea>
                    </div>
                    <div class="edit-form-actions">
                        <button type="submit" class="btn-action btn-save"><i class="fas fa-check"></i> 保存</button>
                        <button type="button" class="btn-action btn-cancel" id="btnCancelEdit"><i class="fas fa-times"></i> 取消</button>
                    </div>
                </form>
            </div>
            <!-- 删除确认 -->
            <div class="delete-confirm-wrap" id="deleteConfirmWrap" style="display:none;">
                <h4><i class="fas fa-exclamation-triangle"></i> 确认删除</h4>
                <p>删除后无法恢复，确定要删除这张照片吗？</p>
                <div class="delete-confirm-actions">
                    <button class="btn-action btn-confirm-delete" id="btnConfirmDelete"><i class="fas fa-trash-alt"></i> 确认删除</button>
                    <button class="btn-action btn-cancel-delete" id="btnCancelDelete"><i class="fas fa-times"></i> 取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 留言弹窗 -->
    <div class="modal" id="commentModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>留下你的思念</h3>
            <div class="photo-preview" id="modalPhotoPreview"></div>
            <form id="commentForm">
                <input type="text" id="commentName" placeholder="您的姓名" required>
                <textarea id="commentText" placeholder="写下您的思念与祝福..." rows="4" required></textarea>
                <button type="submit" class="btn-submit">发送祝福</button>
            </form>
            <div class="comments-list" id="commentsList"></div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
