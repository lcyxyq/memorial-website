<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缅怀纪念 - 永远的回忆</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo"><i class="fas fa-dove"></i> 缅怀纪念</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link active">照片墙</a>
                <a href="register.html" class="nav-link">登记信息</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h2 class="hero-title">永远的回忆</h2>
            <p class="hero-subtitle">那些美好的时光，将永远留在我们心中</p>
        </div>
    </section>

    <main class="main-content">
        <div class="container">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">全部回忆</button>
                <button class="filter-btn" data-filter="recent">最新添加</button>
                <button class="filter-btn" data-filter="most-comments">最多留言</button>
            </div>

            <div class="masonry-grid" id="photoWall">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在加载回忆...</p>
                </div>
            </div>

            <div class="load-more">
                <button class="btn-load-more" id="loadMore">加载更多回忆</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>永远怀念 · 永远铭记</p>
            <p class="footer-quote">"那些我们爱过的人，永远不会真正离开我们"</p>
        </div>
    </footer>

    <!-- 留言弹窗 -->
    <div class="modal" id="commentModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>留下你的思念</h3>
            <div class="photo-preview" id="modalPhotoPreview"></div>
            <form id="commentForm">
                <input type="text" id="commentName" placeholder="您的姓名" required>
                <textarea id="commentText" placeholder="写下您的思念与祝福..." rows="4" required></textarea>
                <button type="submit" class="btn-submit">发送祝福</button>
            </form>
            <div class="comments-list" id="commentsList"></div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
